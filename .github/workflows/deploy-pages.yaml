name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-quartz-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-

      - name: Install npm dependencies
        run: npm ci

      - name: Create .quartz/plugins stub (needed by Head.tsx at compile time)
        run: |
          mkdir -p .quartz/plugins
          echo 'export const CustomOgImagesEmitterName = "og-image"' > .quartz/plugins/index.ts

      - name: Build site (config-loader installs real plugins dynamically)
        run: npx quartz build -d public -v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - listar output
        run: |
          echo "=== Raiz de public/ ===" && ls -la public/ || echo "public/ NO encontrado"
          echo "=== .html en raiz ===" && ls public/*.html 2>/dev/null || echo "sin .html en raiz"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5